<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pengumuman Kelulusan SMK NEGERI 1 PENUKAL UTARA</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f6f9;
}

.container {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 350px;
  border-radius: 10px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

input, button {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
}

button {
  background: #3498db;
  color: white;
  border: none;
  cursor: pointer;
}

#hasil {
  margin-top: 20px;
}
</style>

</head>

<body>

<h2>PENGUMUMAN KELULUSAN</h2>
<p>SMK NEGERI 1 PENUKAL UTARA</p>

<div class="container">
<input type="text" id="nama" placeholder="Masukkan Nama">
<button onclick="cek()">Cek Kelulusan</button>
<div id="hasil"></div>
</div>

<script>
const sheetURL = "https://script.google.com/macros/s/AKfycbw0JJeTwMMGtzC4bVJGFMzugdj2VqN1QQ7SFFPL6PFx6lZEufkMMWhSb4hOSEo2RiU7ug/exec";

async function cek() {
  const input = document.getElementById("nama").value.toLowerCase().trim();
  const hasil = document.getElementById("hasil");

  if (!input) {
    hasil.innerHTML = "Masukkan nama terlebih dahulu";
    return;
  }

  try {
    const res = await fetch(sheetURL);
    const data = await res.json();

    for (let siswa of data) {
      if (siswa.nama.toLowerCase().includes(input)) {
        hasil.innerHTML = `
          <h3>${siswa.nama}</h3>
          <p>Status: <b>${siswa.status}</b></p>
          <a href="${siswa.skl}" target="_blank">
            <button>Download SKL</button>
          </a>
        `;
        return;
      }
    }

    hasil.innerHTML = "Nama tidak ditemukan";
  } catch (e) {
    hasil.innerHTML = "Gagal mengambil data";
  }
}
</script>

</body>
</html>
