<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQDmAoKhw0drIf16ZANBjoaKrn9wvMne1woW30r8ff7v4_uT1vtI0iCHNYeLK0jFKC4khbp_pR072I5/pub?output=csv";

async function cek() {
  const inputNama = document.getElementById("nama").value.toLowerCase().trim();
  const res = await fetch(sheetURL);
  const data = await res.text();

  const rows = data.split("\n").slice(1);

  for (let row of rows) {
    // split aman untuk CSV
    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    const nama = cols[1]?.replace(/"/g, "").toLowerCase().trim();

    if (nama.includes(inputNama)) {
      document.getElementById("hasil").innerHTML = `
        <h3>${cols[1]}</h3>
        Status: <b>${cols[2]}</b><br><br>
        <a href="${cols[3]}" target="_blank">
          <button>Download SKL</button>
        </a>
      `;
      return;
    }
  }

  document.getElementById("hasil").innerHTML = "Nama tidak ditemukan";
}
</script>
